<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Password Strength Checker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
<div class="card">
<h2>Password Strength Checker</h2>
<div class="input-group">
<input type="password" id="password" placeholder="Enter password">
<button id="toggle">Show</button>
</div>
<div class="progress-container">
<div id="progress"></div>
</div>
<p id="strengthText"></p>
<p id="scoreText"></p>
<div class="requirements">
<p id="req-length">Minimum 8 characters</p>
<p id="req-upper">At least one uppercase letter</p>
<p id="req-lower">At least one lowercase letter</p>
<p id="req-number">At least one number</p>
<p id="req-special">At least one special character</p>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
